spring.application.name=devsign-backend

# DATABASE
spring.datasource.driver-class-name: com.mysql.cj.jdbc.Driver
# localhost를 컨테이너 이름인 devsign-database로, DB명을 devsigndb로 수정했습니다.
spring.datasource.url=jdbc:mysql://devsign-database:3306/devsigndb?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul&zeroDateTimeBehavior=convertToNull&rewriteBatchedStatements=true
# docker-compose.yml의 설정값에 맞춰 사용자 이름과 비밀번호를 수정했습니다.
spring.datasource.username=devsignuser
spring.datasource.password=devsign4122

# JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# JWT 설정
jwt.secret=devsign-club-secret-key-for-jwt-token-generation-minimum-256-bits-required-for-hs256
jwt.expiration=3600000

# SERVER
server.port=${PORT:8080}

# CORS Configuration
# 배포 환경에 맞춰 도메인 주소를 허용하도록 수정했습니다.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://devsign.co.kr}

# Multipart Upload Limits
spring.servlet.multipart.max-file-size=1024MB
spring.servlet.multipart.max-request-size=1024MB

# Upload Storage Base Directory
app.upload.base-dir=${APP_UPLOAD_BASE_DIR:uploads}

# DISCORD BOT API (수정된 부분)
# 도커 네트워크 내부 통신을 위해 컨테이너 이름을 호스트로 사용합니다.
discord.bot.url=http://discord-bot:8000

server.forward-headers-strategy=native
