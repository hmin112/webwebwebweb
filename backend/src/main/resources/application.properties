spring.application.name=devsign-backend

# DATABASE
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# docker-compose의 서비스 이름(devsign-database)을 호스트로 사용합니다.
# docker-compose.yml 설정값과 일치합니다.
spring.datasource.url=jdbc:mysql://devsign-database:3306/devsigndb?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&zeroDateTimeBehavior=convertToNull&rewriteBatchedStatements=true
spring.datasource.username=devsignuser
spring.datasource.password=devsign4122

# ✨ [안정성 강화] HikariCP Connection Pool 설정
# 요청이 몰려도 서버가 뻗지 않도록 연결 통로를 최적화합니다.
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.auto-commit=true

# ✨ [성능 최적화] MySQL 드라이버 세부 옵션
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true

# JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
# ✨ [필수] OSIV 설정 (데이터베이스 커넥션 낭비를 방지하여 서버 리프레시 현상 억제)
spring.jpa.open-in-view=true

# JWT 설정
jwt.secret=devsign-club-secret-key-for-jwt-token-generation-minimum-256-bits-required-for-hs256
jwt.expiration=3600000

# SERVER
server.port=${PORT:8080}

# CORS Configuration
# 도메인 주소를 허용합니다.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://devsign.co.kr}

# Multipart Upload Limits
spring.servlet.multipart.max-file-size=1024MB
spring.servlet.multipart.max-request-size=1024MB

# ✨ [수정] Upload Storage Base Directory
# 도커 볼륨 마운트 경로(/devsign-data/uploads -> /app/uploads)와 일치시킵니다.
app.upload.base-dir=/app/uploads

# DISCORD BOT API
# 도커 네트워크 내부의 서비스 이름(discord-bot)을 사용합니다.
discord.bot.url=http://discord-bot:8000

server.forward-headers-strategy=native